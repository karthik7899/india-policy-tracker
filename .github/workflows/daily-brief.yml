name: Scheduled India Policy Briefing

on:
  schedule:
    # Run daily at 02:30 AM UTC (08:00 AM IST)
    - cron: '30 2 * * *'
    # Run weekly briefing on Saturdays at 03:30 AM UTC (09:00 AM IST)
    - cron: '30 3 * * 6'
  workflow_dispatch: # Allows manual trigger of the briefing

jobs:
  run-briefing:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to commit dashboard_data.json back to repo
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Execute Aggregation & Mailer Script
        env:
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: |
          python brief.py

      - name: Commit and Push Updated Dashboard Data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dashboard_data.json watchlist.json
          git commit -m "chore: auto-update daily briefing archive and watchlist database [skip ci]" || echo "No changes to commit"
          git push || echo "No changes to push"
