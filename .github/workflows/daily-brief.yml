name: Scheduled India Policy Briefing

on:
  schedule:
    # Run daily at 02:30 AM UTC (08:00 AM IST)
    - cron: '30 2 * * *'
    # Run weekly briefing on Saturdays at 03:30 AM UTC (09:00 AM IST)
    - cron: '30 3 * * 6'
  workflow_dispatch: # Allows manual trigger of the briefing

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Quality checks run alongside the briefing but deliberately do NOT block
  # it: a formatting nit must never stop the daily email (it did once, for
  # three days). Failures still surface as a red X on the run.
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 black pytest pytest-anyio

      - name: Lint and Format
        run: |
          black --check .
          flake8 .

      - name: Run tests
        run: python -m pytest tests/

  run-briefing:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to commit dashboard_data.json back to repo
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      # The daily cron fires every day including weekends/holidays, when NSE
      # never opened and prices can't have moved — that run just resends
      # yesterday's briefing. The weekly Saturday digest and manual dispatch
      # runs are intentional regardless of trading-day status, so they
      # bypass this gate. See market_calendar.py for the holiday list.
      - name: Check market calendar
        id: gate
        env:
          GH_EVENT_NAME: ${{ github.event_name }}
          GH_EVENT_SCHEDULE: ${{ github.event.schedule }}
        run: |
          python3 - <<'PY'
          import datetime
          import os
          import zoneinfo

          from market_calendar import is_trading_day

          event_name = os.environ.get("GH_EVENT_NAME", "")
          schedule = os.environ.get("GH_EVENT_SCHEDULE", "")
          today_ist = datetime.datetime.now(zoneinfo.ZoneInfo("Asia/Kolkata")).date()

          if event_name == "workflow_dispatch":
              should_run, reason = True, "manual dispatch"
          elif schedule == "30 3 * * 6":
              should_run, reason = True, "weekly Saturday digest always sends"
          else:
              should_run = is_trading_day(today_ist)
              reason = f"daily cron, {today_ist} is_trading_day={should_run}"

          print(f"::notice::Market calendar gate: {reason}")
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"should_run={'true' if should_run else 'false'}\n")
          PY

      - name: Install dependencies
        if: steps.gate.outputs.should_run == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Execute Aggregation & Mailer Script
        if: steps.gate.outputs.should_run == 'true'
        env:
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: |
          python main.py

      - name: Commit and Push Updated Dashboard Data
        if: steps.gate.outputs.should_run == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dashboard_data.json watchlist.json rotation_ledger.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: auto-update daily briefing archive and watchlist database [skip ci]"
            # Rebase in case another run pushed first; a real push failure
            # must fail the job, not be swallowed.
            git pull --rebase origin main
            git push
          fi
